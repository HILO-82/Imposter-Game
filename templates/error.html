{% extends "base.html" %}
{% block title %}Error {{ code }}{% endblock %}
{% block content %}
<div class="game-container max-w-lg mx-auto rounded-2xl shadow-2xl p-8 text-center">
    <h1 class="text-4xl font-bold text-purple-800 mb-4">{{ code }}</h1>
    <p class="text-gray-700 mb-6">{{ message }}</p>
    <a href="{{ url_for('lobby.index') }}" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-6 rounded-lg">
        <i class="fas fa-home"></i> Home
    </a>
</div>
{% endblock %}
